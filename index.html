<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INTERPOL Familien Panel</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-950 text-white font-sans">

<nav class="bg-gray-900 p-4 flex justify-between">
    <h1 class="text-xl font-bold text-blue-500">INTERPOL</h1>
    <div class="space-x-6">
        <a href="#dashboard">Dashboard</a>
        <a href="#payouts">Auszahlungen</a>
        <a href="#logs">Logs</a>
        <a href="#events">Events</a>
        <a href="#leader">Leader Menü</a>
    </div>
</nav>

<section id="dashboard" class="p-10">
    <h2 class="text-3xl text-blue-500 mb-6">Dashboard</h2>
    <div class="grid grid-cols-3 gap-6">
        <div class="bg-gray-800 p-6 rounded-xl">
            <h3>Fam Credits</h3>
            <p class="text-2xl text-blue-400">250,000 $</p>
        </div>
        <div class="bg-gray-800 p-6 rounded-xl">
            <h3>Mitglieder</h3>
            <p class="text-2xl text-blue-400">18</p>
        </div>
        <div class="bg-gray-800 p-6 rounded-xl">
            <h3>Nächstes Event</h3>
            <p class="text-2xl text-blue-400">Großraub</p>
        </div>
    </div>
</section>

<section id="payouts" class="p-10">
    <h2 class="text-3xl text-blue-500 mb-6">Auszahlungen</h2>
    <div class="bg-gray-800 p-6 rounded-xl">
        <p>Max_RP – 15,000 $ – Bestätigt</p>
    </div>
</section>

<section id="logs" class="p-10">
    <h2 class="text-3xl text-blue-500 mb-6">Logs</h2>
    <div class="bg-gray-800 p-6 rounded-xl">
        <p>Max_RP hat 15,000$ erhalten.</p>
    </div>
</section>

<section id="events" class="p-10">
    <h2 class="text-3xl text-blue-500 mb-6">Events</h2>
    <div class="bg-gray-800 p-6 rounded-xl">
        <p>Banküberfall – Erfolgreich</p>
    </div>
</section>

<section id="leader" class="p-10">
    <h2 class="text-3xl text-blue-500 mb-6">Leader Menü</h2>
    <div class="bg-gray-800 p-6 rounded-xl">
        <button class="bg-blue-600 px-4 py-2 rounded">Event erstellen</button>
    </div>
</section>

<footer class="text-center p-6 text-gray-500">
INTERPOL © 2026
</footer>

</body>
</html>
